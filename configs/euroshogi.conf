= piece order =
PNGKRBTVDHpngkrbtvdh

= piece roles =
royal       :Kk

= piece moves =
// Pawn: EuroShogi pawns step one square forward and capture one square
// diagonally forward (no double-step). Placeholder = makruk-style pawn.
// TODO verify against fairy-stockfish.
Pp:mnW|cnF
// Knight: EuroShogi knights move to the forward knight squares only, not
// all eight. Placeholder = full (1,2) leaper. TODO verify against fairy.
Nn:N
// Gold: king minus the two backward diagonals. Verbatim shogi.conf.
Gg:[..$46]K
// King: one step any direction.
Kk:K
// Rook: slides orthogonally.
Rr:R
// Bishop: slides diagonally.
Bb:B
// Promoted Pawn: moves as Gold. Verbatim shogi.conf.
Tt:[..$46]K
// Promoted Knight: moves as Gold. Verbatim shogi.conf.
Vv:[..$46]K
// Dragon King (promoted Rook): Rook slide plus one-step diagonal. Verbatim.
Dd:R|F
// Dragon Horse (promoted Bishop): Bishop slide plus one-step orthogonal.
Hh:B|W

