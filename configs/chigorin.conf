= piece moves =
// Pawn: one forward, two on first move, diagonal capture, en passant.
Pp:mnW|im<nW-pnW>|tcnF
// Rook: slides orthogonally.
Rr:R
// Knight: (1,2) leaper. White's army uses knights.
Nn:N
// Bishop: slides diagonally. Black's army uses bishops.
Bb:B
// Queen: slides any direction. Black's army fields the queen.
Qq:Q
// Chancellor: slides orthogonally like a Rook AND leaps like a Knight
// (R|N). Copied verbatim from capablanca.conf. White's army fields it.
Cc:R|N
// King: one step any direction.
Kk:K

= promotions =
// White (knight + chancellor army) promotes within its own pieces;
