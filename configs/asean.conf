= general =
ASEAN Chess
rnbqkbnr/8/pppppppp/8/8/PPPPPPPP/8/RNBQKBNR w

= rules =
promotions
repetition limit

= repetition limit =
limit:3

= pieces =
Pp:Pawn
Rr:Rook
Nn:Knight
Bb:Bishop
Qq:Queen
Kk:King

= piece order =
PRNBQKprnbqk

= piece roles =
royal       :Kk

= piece moves =
// Pawn: one step forward, diagonal capture, no double-step, no en passant
// (makruk-style pawn). Verbatim makruk.conf Soldier token.
Pp:mnW|cnF
// Rook: slides orthogonally.
Rr:R
// Knight: (1,2) leaper.
Nn:N
// Bishop: slides diagonally (FIDE bishop, unlike makruk's Khon).
Bb:B
// Queen: slides any direction (FIDE queen, unlike makruk's Met).
Qq:Q
// King: one step any direction.
Kk:K

= promotions =
// ASEAN pawns promote to Queen only. TODO verify the promotion rank
// (last rank here vs the makruk 6th-rank zone) against fairy-stockfish.
P:Q
p:q

