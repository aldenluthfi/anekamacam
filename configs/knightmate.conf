= piece moves =
// Pawn: one forward, two on first move, diagonal capture, en passant.
Pp:mnW|im<nW-pnW>|tcnF
// Rook: slides orthogonally.
Rr:R
// Commoner: moves one step any direction like a King, but is NOT royal
// (replaces the knights). Move atom K, no royal role.
Mm:K
// Bishop: slides diagonally.
Bb:B
// Queen: slides any direction.
Qq:Q
// King: royal, but moves like a Knight (1,2 leaper). Royalty comes from
// the role below, not the move atom.
Kk:N

