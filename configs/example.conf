// This section defines the piece roles. there are 4 piece roles, promoting
// pieces, big pieces, major pieces, and royal pieces. Each line corresponds to
// a piece and is formatted as follows:
//
// (roles):(characters)
//
= piece roles =
big         :RrNnBbQqWwFfAaDdCcZzHhGgTt
major       :KkQqSsTt
royal       :Kk

// This section defines the move patterns for each piece. Each line corresponds
// to a piece and is formatted as follows:
//
// (character/s):(move pattern)
//
// The characters are the same as the ones defined in the = pieces = section. If
// its the same as both, the black piece will always mirror the white piece
// (up is down, left is right), if the move is assymetrical the move pattern can
// be defined for each of black and white pieces. All pieces must have a move
// pattern defined in this section. The move pattern is written in Cheesy King
// Notation (CKN).
= piece moves =
Pp:mnW|im<nW-pnW>|tcnF
K:K|O{4,2}|o{3,1}
k:K|o{4,2}|O{3,1}
Rr:R
Nn:N
Bb:B
Qq:Q
Ww:W
Ff:F
Aa:A
Dd:D
Cc:C
Zz:Z
Ss:S
Hh:H
Gg:G
Tt:T

// This section defines the pieces that a piece can promote to. Each line
// corresponds to a piece and is formatted as follows:
//
// (character/s):(promotions)
//
= promotions =
P:RBNQ
p:rbnq

// This section defines the mandatory and/or optional promotion zones for
// pieces. Each line corresponds to a piece and is formatted as follows:
//
// (character/s):(mandatory promotion zones)
//
// The mandatory and/or optional promotion zones is parsed similar to a FEN
// position, but instead of pieces, the X character represent the piece that
// must promote upon moving into or out of that square. If a piece has a
// mandatory promotion zone, then it must promote upon moving into or out of any
// of the squares in that zone. If a piece has an optional promotion zone, then
// it may choose to promote or not promote upon moving into or out any of the
// squares in that zone.
= mandatory promotion zones =
P:XXXXXXXX/8/8/8/8/8/8/8
p:8/8/8/8/8/8/8/XXXXXXXX

= optional promotion zones =
P:XXXXXXXX/XXXXXXXX/8/8/8/8/8/8
p:8/8/8/8/8/8/XXXXXXXX/XXXXXXXX

// This section defines the special rules for drops. Each line corresponds to a
// piece and is formatted as follows:
//
// (character/s):(drop rules)
//
// The drop rule is written in the Cheesy King Drop Notation (CKDN).
= drops =
Pp:k#@n+sW*

// This section defines the limits on the number of pieces that can be on the
// board at a time. Each line corresponds to a piece and is formatted as
// follows:
//
// (character/s):(limit)
//
// If a piece is not defined in this section, it is assumed to have no limit.
= piece count limits =
Qq:1

// This section defines the forbidden zones for pieces. Each line corresponds to
// a piece and is formatted as follows:
//
// (character/s):(forbidden zones)
//
// The forbidden zones is parsed similar to a FEN position, but instead of
// pieces, the X character represent the piece that is forbidden to move into
// that square.
= forbidden zones =
P:XXXXXXXX/8/8/8/8/8/8/XXXXXXXX
p:XXXXXXXX/8/8/8/8/8/8/XXXXXXXX