
= general =
// The title of the variant
Example Variant

// The initial board position in Cheesy Forsyth-Edwards Notation (CFEN)
// The dimensions of the board are determined by the number of ranks and files
// in this section.
//
// The format is similar to FEN depending on the ruleset there is 3-5 parts, the
// order is as follows:
//
// (position) (side) (castling rights) (en passant square) (in hand pieces)
//
// - position            : Same as normal FEN
//
// - side                : Same as normal FEN
//
// - castling rights     : Same as normal FEN
//
// - en passant square   : Formatted 'ssseeez' where s is the en passant square
//                         index itself in hex, e is the square index of the
//                         piece that can be captured en passant in hex, and z
//                         is the char of piece that can be captured en passant.
//                         "*" if no en passant square.
//
// - in hand pieces      : Formatted '(w)/(b)' where each w and b is formatted
//                         with the pieces in hand. e.g. P2N means a pawn and
//                         two knights in hand. "-" if no pieces in hand for
//                         that color so an empty hand for both is -/-
//
// This starting position will also be used to determine if the peices have
// moved or not for the purposes of castling rights and move patterns that
// depend on whether a piece has moved or not.
rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq * -/-


// These are all the special rules that can be enabled for a variant. Each rule
// is comma-separated and the order in which they are listed does not matter.
// The rules that are enabled in this section will determine which sections must
// be included in the config file and how the CFEN string should be formatted.
// If a rule is enabled but the corresponding sections or CFEN formatting is not
// correct, it will throw an error when parsing the config file.
= rules =

// Enables castling for the variant. If enabled, the castling rights in the CFEN
// string will be parsed and applied. If disabled, the all CFEN for this variant
// should not have any castling rights otherwise it will throw an error
castling

// Enables en passant for the variant. If enabled, the en passant square in the
// CFEN string will be parsed and applied. If disabled, the all CFEN for this
// variant should not have an en passant square (indicated by *) otherwise it
// will throw an error. Pieces that have 'p' or 't' on their move patterns will
// also throw an error if this is disabled since they rely on en passant
// captures.
en passant

// Enables promotions for the variant. If enabled, the = promotions =, and one of
// either = mandatory promotion zones = or = optional promotion zones = section of
// the config must exist. Not every piece has to have a promotion defined in the
// = promotions = section, but any piece that can promote must have either its
// mandatory or optional promotion zone defined. if disabled, all = promotions =,
// = mandatory promotion zones =, and = optional promotion zones = sections should
// not exist otherwise it will throw an error.
promotions

// This rule states that pieces in the player's hand can be dropped onto the
// board instead of making a normal move. If enabled, the in hand pieces in the
// CFEN string will be parsed and applied. If disabled, the all CFEN for this
// variant should not have any pieces in hand (indicated by -/-) otherwise it
// will throw an error. There is an additional optional = drop rules = section
// in the config file that defines special rules for some pieces
drops

// This rule states that there is a limit of the number of each type of piece
// that can be on the board at a time. This affects promotion options and drops
// since you cannot promote or drop a piece if it would exceed the limit. The
// piece count limits are defined in the = piece count limits = section of the
// config file. Not all piece count limits have to be defined, but any piece
// that is not defined is assumed to have no limit. If this rule is disabled,
// the = piece count limits = section should not exist otherwise it will throw an
// error.
piece count limits

// This rule sets forbidden zones in which pieces cannot move into. This affects
// normal moves, promotion options, and drops. If enabled, the forbidden zones
// are defined in the = forbidden zones = section of the config file. If disabled,
// the = forbidden zones = section should not exist otherwise it will throw an
// error. Not all pieces have to have forbidden zones defined, but any piece
// that can move into a forbidden zone must have its forbidden zones defined in
// the = forbidden zones = section of the config file.
forbidden zones

// This rule states that pieces that promote upon reaching the promotion zone
// must be a piece that has been captured previously by the opponent. This rule
// requires promotions to be enabled.
promote to captured

// This rule states that promoted pieces that is captured will be demoted back
// to the piece it was before promotion and put in the opponent's hand instead
// of being removed from the game. Consequently, each piece must have exactly
// one piece that it can be demoted from. This rule requires promotions to be
// enabled.
demote upon capture

// This rule states that stalemate is a loss for the stalemated player instead
// of a draw. If disabled, stalemate is a draw.
stalemate loss

// This rule states that at the beginning of the game, players have pieces in
// hand that they must drop onto the board before making any normal moves. If
// enabled, the in hand pieces in the CFEN string will be parsed and applied.
// The setup phase will start at the initial position until both players have
// no pieces in hand. When parsing a fen, the game will assume setup phase when
// there is no royal piece on the board, otherwise it will assume setup phase
// is over.
setup phase

// a player can make a move that creates a stand-off (both players in check),
// then the next player to move must break it on their next turn. One example
// that uses this rule is Korean Chess (Janggi) where if a player moves their
// piece such that it creates a stand-off with the opponent's king, then the
// opponent must move out of the stand-off on their next turn or else they
// lose. If disabled, stand-off moves are illegal.
stand-offs

// This rule generalizes the 50-move rule. If enabled, the
// = halfmove clock = section must be defined with:
// - limit:n        (draw threshold in halfmoves)
// - pieces:Pp...   (piece chars whose non-capturing moves reset the clock)
// Captures and drops reset the clock regardless.
halfmove clock

// This rule states that there is a limit on the number of times a position can
// be repeated before the game ends in a draw. The = repetition limit = section
// must be defined in the config file to specify the repetition limit. If
// disabled, the = repetition limit = section should not exist otherwise it
// will throw an error.
repetition limit

// This section defines the configurable halfmove-clock draw rule.
// Format:
// limit:n
// pieces:Pp...
= halfmove clock =
limit:100
pieces:Pp

// This section defines the repetition draw threshold.
= repetition limit =
limit:3

// In this section the pieces and their corresponding characters in the CFEN
// string are defined. Each line corresponds to a piece and is formatted as
// follows:
//
// (characters):(name)
//
// The characters are the ones that will be used in the CFEN string to represent
// that piece. The first character in the characters will represent the white
// version of the piece and the second character will represent the black
// version of the piece.
= pieces =

Pp:Pawn

// Below lists all hardcoded default pieces that can be used to create move
// patterns in Cheesy King Notation (CKN).
// Orthogonal slider
Rr:Rook

// (1, 2) leaper
Nn:Knight

// Diagonal slider
Bb:Bishop

// Bishop + Rook slider
Qq:Queen

// (1, 0) leaper
Ww:Wazir

// (1, 1) leaper
Ff:Ferz

// Wazir + Ferz leaper
Kk:King

// (2, 2) leaper
Aa:Alfil

// (2, 0) leaper
Dd:Dabbabah

// (3, 1) leaper
Cc:Camel

// (2, 4) leaper
Zz:Zebra

// Alfil + Dabbabah leaper
Ss:Alibaba

// (3, 0) leaper
Hh:Hawk

// (3, 3) leaper
Gg:Griffin

// Griffin + Hawk leaper
Tt:Grawk


// This section defines the piece index order used by evaluation PST mapping.
// PST rows in = evaluation parameters = are keyed by = pieces = entries, while
// runtime still assigns final PSTs by = piece order = indices.
= piece order =
PRNBQWFKADCZSHGTprnbqwfkadczshgt

