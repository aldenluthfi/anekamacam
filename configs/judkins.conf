= general =
Judkins Shogi
rbnsgk/5p/6/6/P5/KGSNBR w -/-

= rules =
promotions
drops
forbidden zones
stalemate loss
repetition limit

= repetition limit =
limit:4

= pieces =
Pp:Pawn
Nn:Knight
Ss:Silver
Gg:Gold
Kk:King
Rr:Rook
Bb:Bishop
Tt:Promoted Pawn
Vv:Promoted Knight
Ww:Promoted Silver
Dd:Dragon King
Hh:Dragon Horse

= piece order =
PNSGKRBTVWDHpnsgkrbtvwdh

= piece roles =
royal       :Kk

= piece moves =
// Pawn: one square straight forward. Verbatim shogi.conf.
Pp:v!vnW
// Knight: the two forward (1,2) jumps only. Verbatim shogi.conf.
Nn:v!v[18]N
// Silver: one step diagonally or one straight forward. Verbatim shogi.conf.
Ss:F|nW
// Gold: king minus the two backward diagonals. Verbatim shogi.conf.
Gg:[..$46]K
// King: one step any direction.
Kk:K
// Rook: slides orthogonally.
Rr:R
// Bishop: slides diagonally.
Bb:B
// Promoted Pawn: moves as Gold. Verbatim shogi.conf.
Tt:[..$46]K
// Promoted Knight: moves as Gold. Verbatim shogi.conf.
Vv:[..$46]K
// Promoted Silver: moves as Gold. Verbatim shogi.conf.
Ww:[..$46]K
// Dragon King (promoted Rook): Rook slide plus one-step diagonal. Verbatim.
Dd:R|F
// Dragon Horse (promoted Bishop): Bishop slide plus one-step orthogonal.
Hh:B|W

