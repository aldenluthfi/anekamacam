= piece moves =
// Pawn: one forward, two on first move, diagonal capture, en passant.
Pp:mnW|im<nW-pnW>|tcnF
// Rook: slides orthogonally.
Rr:R
// Knight: (1,2) leaper.
Nn:N
// Bishop: slides diagonally.
Bb:B
// Queen: slides any direction.
Qq:Q
// Chancellor: Rook slide plus Knight leap (R|N). Verbatim capablanca.conf.
Cc:R|N
// Archbishop: Bishop slide plus Knight leap (N|B). Verbatim capablanca.conf.
Aa:N|B
// King: one step any direction.
Kk:K

