= rules =
promotions
repetition limit

= repetition limit =
limit:3

= pieces =
Pp:Pawn
Rr:Rook
Nn:Knight
Ss:Khon
Aa:Ai-Wok
Kk:King

= piece order =
PRNSAKprnsak

= piece roles =
royal       :Kk

= piece moves =
// Pawn: one step forward, diagonal capture, no double-step, no en passant
// (makruk-style pawn). Verbatim makruk.conf Soldier token.
Pp:mnW|cnF
// Rook: slides orthogonally.
Rr:R
// Knight: (1,2) leaper.
Nn:N
// Khon: one step diagonally or one step straight forward (F | forward
// wazir). Verbatim makruk.conf Khon token.
Ss:F|nW
// Ai-Wok: the strengthened Met that replaces it in this variant. Intended
// as a queen-class piece; exact move uncertain. Placeholder = Rook slide
// plus Knight leap plus Ferz step. TODO verify against fairy-stockfish.
Aa:R|N|F
// King: one step any direction.
Kk:K

= promotions =
// Pawn promotes to the Ai-Wok. TODO verify the promotion rank against
// fairy-stockfish (makruk uses a 6th-rank zone).
P:A
p:a

= mandatory promotion zones =
P:8/8/XXXXXXXX/8/8/8/8/8
